<!DOCTYPE html>
<html>
<head>
  <title>Sunno Pipeline Test</title>
  <style>
    body {
      font-family: monospace;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #f9f9f9;
    }
    button {
      padding: 12px 24px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      margin: 8px;
    }
    #start { background: #22c55e; color: white; }
    #stop { background: #ef4444; color: white; }
    #log {
      margin-top: 20px;
      padding: 16px;
      background: white;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      min-height: 200px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h2>Sunno Pipeline Test</h2>
  <p>Click Start, speak in Hindi/Hinglish, hear Priya respond.</p>

  <button id="start">Start Speaking</button>
  <button id="stop" disabled>Stop</button>

  <div id="log">Waiting to start...</div>

  <script>
    const log = document.getElementById("log");
    const startBtn = document.getElementById("start");
    const stopBtn = document.getElementById("stop");

    let ws;
    let mediaStream;
    let audioContext;
    let processor;
    let source;
    let isPlaying = false;

    const SAMPLE_RATE = 16000;

    function addLog(msg) {
      log.textContent += "\n" + msg;
      log.scrollTop = log.scrollHeight;
    }

    function getAudioContext() {
      if (!audioContext || audioContext.state === "closed") {
        audioContext = new AudioContext({ sampleRate: SAMPLE_RATE });
      }
      return audioContext;
    }

    async function playAudio(arrayBuffer) {
      const ctx = getAudioContext();
      if (ctx.state === "suspended") await ctx.resume();

      const audioBuffer = await ctx.decodeAudioData(arrayBuffer.slice(0));
      const source = ctx.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(ctx.destination);

      isPlaying = true;
      addLog("Priya responding...");

      return new Promise((resolve) => {
        source.onended = () => {
          isPlaying = false;
          addLog("Done — speak again");
          resolve();
        };
        source.start();
      });
    }

    function stopSession() {
      if (processor) {
        processor.disconnect();
        processor.onaudioprocess = null;
      }
      processor = null;

      if (source) {
        source.disconnect();
      }
      source = null;

      if (mediaStream) {
        mediaStream.getTracks().forEach((track) => track.stop());
      }
      mediaStream = null;

      if (ws) {
        ws.close();
      }
      ws = null;

      startBtn.disabled = false;
      stopBtn.disabled = true;
      addLog("Stopped");
    }

    startBtn.onclick = async () => {
      log.textContent = "Connecting...";
      startBtn.disabled = true;
      stopBtn.disabled = false;

      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${protocol}//${location.host}`);
      ws.binaryType = "arraybuffer";

      ws.onopen = async () => {
        addLog("Connected to server");

        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const ctx = getAudioContext();
          if (ctx.state === "suspended") await ctx.resume();

          source = ctx.createMediaStreamSource(mediaStream);
          processor = ctx.createScriptProcessor(4096, 1, 1);

          processor.onaudioprocess = (event) => {
            if (ws?.readyState !== WebSocket.OPEN || isPlaying) return;

            const input = event.inputBuffer.getChannelData(0);
            const pcm = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
              const sample = Math.max(-1, Math.min(1, input[i]));
              pcm[i] = sample < 0 ? sample * 0x8000 : sample * 0x7fff;
            }
            ws.send(pcm.buffer);
          };

          source.connect(processor);
          processor.connect(ctx.destination);
          addLog("Listening — speak now...");
        } catch (err) {
          addLog("Microphone error: " + err.message);
          stopSession();
        }
      };

      ws.onmessage = async (event) => {
        if (typeof event.data === "string") {
          const msg = JSON.parse(event.data);
          if (msg.type === "transcript") addLog("You said: " + msg.text);
          if (msg.type === "agent") addLog("Priya: " + msg.text);
          if (msg.type === "error") addLog("Error: " + msg.message);
          return;
        }

        if (!isPlaying) {
          await playAudio(event.data);
        }
      };

      ws.onclose = () => {
        if (mediaStream) stopSession();
        else addLog("Disconnected");
      };

      ws.onerror = () => addLog("Connection error");
    };

    stopBtn.onclick = stopSession;
  </script>

</body>
</html>
